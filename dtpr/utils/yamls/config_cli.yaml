# ---------------------------------- posible optional arguments ---------------------------------- #
opt_args:
    config-path: &config_path
        flags: ["-cf", "--config-file"]
        dest: "config_file"
        type: str
        help: "Path to the configuration file."
    inputs: &inputs
        flags: ["-i", "--inputs"]
        dest: "inputs"
        type: str
        nargs: "+"
        default: ~
        help: "Input ROOT or Parquet files. One or more: file, directory, glob, or 'file.root:treepath'. Omit to use filesets defined in the config YAML."
    output-path: &output_path
        flags: ["-o", "--outputpath"]
        dest: "outfolder"
        type: str
        default: "./results"
        help: "Directory to save the output files. If the directory does not exist, it will be created automatically."
    tag: &tag
        flags: ["-t", "--tag"]
        dest: "tag"
        type: str
        default: ""
        help: "Tag to be added to the output file names."
    max-files: &max_files
        flags: ["--maxfiles"]
        dest: "maxfiles"
        type: int
        default: -1
        help: "Maximum number of files to read. -1 is default to read all available files."
    max-events: &max_events
        flags: ["--maxevents"]
        dest: "maxevents"
        type: int
        default: -1
        help: "Maximum number of events to read. -1 is default to read all available events."
    tree-name: &tree_name
        flags: ["-tr", "--tree"]
        dest: "tree_name"
        type: str
        default: ~
        help: "TTree path inside the ROOT files (e.g. 'dtNtupleProducer/DTTREE'). Can also be embedded in -i as 'file.root:treepath'. Falls back to 'treename:' in the fileset config."
    event-number: &event_number
        flags: ["-evn", "--event-number"]
        dest: "event_number"
        type: "lambda arg: int(arg) if arg.lstrip('-').isdigit() else arg"
        default: 0
        help: "Event number to be analyzed. Default is 0."
    wheel: &wheel
        flags: ["-wh", "--wheel"]
        dest: "wheel"
        type: int
        default: -2
        help: "Wheel number to be analyzed. Default is -2."
    sector: &sector
        flags: ["-sc", "--sector"]
        dest: "sector"
        type: int
        default: 1
        help: "Sector number to be analyzed. Default is 1."
    station: &station
        flags: ["-st", "--station"]
        dest: "station"
        type: int
        default: 1
        help: "Station number to be analyzed. Default is 1."
    save: &save
        flags: ["-s", "--save"]
        dest: "save"
        action: "store_true"
        help: "Save the products of the analysis. Default is False."
    debug: &debug
        flags: ["--debug"]
        dest: "debug"
        action: "store_true"
        help: "Print debug information. Default is False."
    template-name: &template_name
        flags: ["-n", "--name"]
        dest: "name"
        type: str
        default: "analysis_template"
        help: "Name of the template."
    artist-names: &artist_names
        flags: ["--artist-names"]
        dest: "artist_names"
        type: str
        nargs: "*"
        help: "Artist name(s) to include. Can be a single string or multiple strings."
    cores-number: &cores_number
        flags: ["-c", "--cores"]
        dest: "ncores"
        type: int
        default: -1
        help: "Number of CPU cores to use for parallel processing. Default is -1, which means no parallelization."
    use-executable: &use_executable
        flags: ["-e", "--exec"]
        dest: "use_executable"
        action: "store_true"
        help: "Use the pre-built executable. Default is False."

# ---------------------------------- posible analysis ---------------------------------------- #
pos_args:
    fill-histos:
        name: "fill-histos"
        help: "Fill predefined ROOT histograms based on event-by-event information from DT NTuple files."
        func: "dtpr.analysis.fill_histograms.fill_histos"
        opt_args:
            config-path: *config_path
            inputs: *inputs
            output-path: *output_path
            tag: *tag
            max-files: *max_files
            max-events: *max_events
            tree-name: *tree_name
            cores-number: *cores_number
    plot-dt:
        name: "plot-dt"
        help: "Produce CMS DT chamber plot (local view) for a specific event digis information from a DT NTuple files."
        func: "dtpr.analysis.plot_dt_chamber.plot_dt_chamber"
        opt_args:
            config-path: *config_path
            inputs: *inputs
            output-path: *output_path
            tag: *tag
            max-files: *max_files
            tree-name: *tree_name
            event-number: *event_number
            wheel: *wheel
            station: *station
            sector: *sector
            save: *save
            artist-names: *artist_names
    plot-dts:
        name: "plot-dts"
        help: "Produce CMS DT chamber plots (global view) based on event-by-event digis information from DT NTuple files."
        func: "dtpr.analysis.plot_dt_chambers.plot_dt_chambers"
        opt_args:
            config-path: *config_path
            inputs: *inputs
            output-path: *output_path
            tag: *tag
            max-files: *max_files
            tree-name: *tree_name
            event-number: *event_number
            wheel: *wheel
            sector: *sector
            save: *save
            artist-names: *artist_names
    inspect-events:
        name: "inspect-events"
        help: "Inspect specific events from DT NTuple files."
        func: "dtpr.analysis.inspect_events.inspect_events"
        opt_args:
            config-path: *config_path
            inputs: *inputs
            max-files: *max_files
            tree-name: *tree_name
            event-number: *event_number
    events-visualizer:
        name: "events-visualizer"
        help: "Launch the events visualizer for DT NTuple files."
        func: "dtpr.analysis.run_events_visualizer.open_visualizer"
        opt_args:
            config-path: *config_path
            inputs: *inputs
            max-files: *max_files
            tree-name: *tree_name
            use-executable: *use_executable
    # -------------------------------- dev/debug ------------------------------------------------- #
    test-cli:
        name: "test-cli"
        help: "Print all parsed CLI arguments — smoke-test for argument wiring."
        func: "dtpr.analysis.test_cli.test_cli"
        opt_args:
            config-path: *config_path
            inputs: *inputs
            max-files: *max_files
            tree-name: *tree_name
            event-number: *event_number
            output-path: *output_path
            tag: *tag

    # -------------------------------- posible create-templates ---------------------------------- #
    create-particle:
        name: "create-particle"
        help: "Create a new particle class template."
        func: "dtpr.utils.create_templates.create_particle_class_template"
        opt_args:
            output-path: *output_path
            template-name: *template_name
    create-config:
        name: "create-config"
        help: "Create a config file for running analysis."
        func: "dtpr.utils.create_templates.create_run_config_template"
        opt_args:
            output-path: *output_path
    create-analysis:
        name: "create-analysis"
        help: "Create a new analysis template."
        func: "dtpr.utils.create_templates.create_analysis_template"
        opt_args:
            output-path: *output_path
            template-name: *template_name
    create-histogram:
        name: "create-histo"
        help: "Create a new histogram template."
        func: "dtpr.utils.create_templates.create_histogram_template"
        opt_args:
            output-path: *output_path
            template-name: *template_name
